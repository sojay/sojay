<svg width="600" height="380" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: "JetBrains Mono","Fira Code","Cascadia Code","Consolas",monospace; font-size: 13.5px; }
    .dim  { fill: #8b949e; }
    .key  { fill: #79c0ff; }
    .val  { fill: #e6edf3; }
    .user { fill: #3fb950; }
    .sep  { fill: #30363d; }
    .link { fill: #79c0ff; }
  </style>

  <!-- Background -->
  <rect width="600" height="380" rx="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="600" height="40" rx="10" fill="#161b22"/>
  <rect y="32" width="600" height="8" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="20" r="6" fill="#28ca41"/>

  <!-- Window title -->
  <text x="300" y="25" class="dim" text-anchor="middle" font-size="12">sojay@github — zsh</text>

  <!-- Prompt -->
  <text y="74" x="24">
    <tspan class="user">sojay</tspan><tspan class="dim">@</tspan><tspan class="user">github</tspan><tspan class="dim"> ~ $</tspan>
  </text>

  <!-- Separator 1 -->
  <text x="24" y="98" class="sep">────────────────────────────────────────</text>

  <!-- Role -->
  <text x="24" y="122"><tspan class="key">Role</tspan><tspan class="dim"> .... </tspan><tspan class="val">Cloud &amp; Infrastructure Engineer</tspan></text>

  <!-- Certs -->
  <text x="24" y="146"><tspan class="key">Certs</tspan><tspan class="dim"> ... </tspan><tspan class="val">CKA · RHCSA · AWS SA</tspan></text>

  <!-- Stack -->
  <text x="24" y="170"><tspan class="key">Stack</tspan><tspan class="dim"> ... </tspan><tspan class="val">K8s · Terraform · Ansible · Go</tspan></text>

  <!-- CI/CD -->
  <text x="24" y="194"><tspan class="key">CI/CD</tspan><tspan class="dim"> ... </tspan><tspan class="val">Jenkins · GitLab CI · ArgoCD</tspan></text>

  <!-- Cloud -->
  <text x="24" y="218"><tspan class="key">Cloud</tspan><tspan class="dim"> ... </tspan><tspan class="val">AWS · Azure · GCP</tspan></text>

  <!-- Obs -->
  <text x="24" y="242"><tspan class="key">Obs</tspan><tspan class="dim"> ..... </tspan><tspan class="val">Prometheus · Grafana · Loki</tspan></text>

  <!-- Now -->
  <text x="24" y="266"><tspan class="key">Now</tspan><tspan class="dim"> ..... </tspan><tspan class="val">homelab automation + OSS</tspan></text>

  <!-- OSS -->
  <text x="24" y="290"><tspan class="key">OSS</tspan><tspan class="dim"> ..... </tspan><tspan class="val">home-operations/tuppr</tspan></text>

  <!-- Separator 2 -->
  <text x="24" y="314" class="sep">────────────────────────────────────────</text>

  <!-- Web -->
  <text x="24" y="338"><tspan class="key">Web</tspan><tspan class="dim"> ..... </tspan><tspan class="link">resume.samokorie.com</tspan></text>

  <!-- LinkedIn -->
  <text x="24" y="362"><tspan class="key">LinkedIn</tspan><tspan class="dim">  </tspan><tspan class="link">linkedin.com/in/sokorie</tspan></text>

</svg>