<svg viewBox="0 0 820 400" width="820" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: "JetBrains Mono","Fira Code","Cascadia Code","Consolas",monospace; font-size: 14px; }
    .dim  { fill: #8b949e; }
    .key  { fill: #79c0ff; }
    .val  { fill: #e6edf3; }
    .user { fill: #3fb950; }
    .sep  { fill: #21262d; }
    .link { fill: #79c0ff; }
    .title { fill: #8b949e; font-size: 12px; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .cursor { animation: blink 1.1s step-end infinite; fill: #3fb950; }
  </style>

  <!-- Background -->
  <rect width="820" height="400" rx="10" fill="#0d1117"/>

  <!-- Top accent line -->
  <rect width="820" height="3" rx="0" fill="#238636"/>
  <rect y="0" width="820" height="3" rx="3" fill="#238636"/>

  <!-- Title bar -->
  <rect y="3" width="820" height="38" fill="#161b22"/>
  <rect y="37" width="820" height="4" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="46" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="70" cy="22" r="6" fill="#28ca41"/>

  <!-- Window title -->
  <text x="410" y="27" class="title" text-anchor="middle">sojay@github — zsh</text>

  <!-- Prompt line -->
  <text y="80" x="28">
    <tspan class="user">sojay</tspan><tspan class="dim">@</tspan><tspan class="user">github</tspan><tspan class="dim"> ~ $ </tspan><tspan class="cursor">▌</tspan>
  </text>

  <!-- Separator 1 -->
  <line x1="28" y1="100" x2="792" y2="100" stroke="#21262d" stroke-width="1"/>

  <!-- Data rows — y starts at 126, step 24 -->
  <text x="28" y="126"><tspan class="key">Role</tspan><tspan class="dim">  ....  </tspan><tspan class="val">Cloud &amp; Infrastructure Engineer</tspan></text>
  <text x="28" y="150"><tspan class="key">Certs</tspan><tspan class="dim"> ...  </tspan><tspan class="val">CKA · RHCSA · AWS SA</tspan></text>
  <text x="28" y="174"><tspan class="key">Stack</tspan><tspan class="dim"> ...  </tspan><tspan class="val">K8s · Terraform · Ansible · Go</tspan></text>
  <text x="28" y="198"><tspan class="key">CI/CD</tspan><tspan class="dim"> ...  </tspan><tspan class="val">Jenkins · GitLab CI · ArgoCD · Flux</tspan></text>
  <text x="28" y="222"><tspan class="key">Cloud</tspan><tspan class="dim"> ...  </tspan><tspan class="val">AWS · Azure · GCP</tspan></text>
  <text x="28" y="246"><tspan class="key">Obs</tspan><tspan class="dim">   .....  </tspan><tspan class="val">Prometheus · Grafana · Loki · OTel</tspan></text>
  <text x="28" y="270"><tspan class="key">Now</tspan><tspan class="dim">   .....  </tspan><tspan class="val">homelab automation + OSS</tspan></text>
  <text x="28" y="294"><tspan class="key">OSS</tspan><tspan class="dim">   .....  </tspan><tspan class="val">home-operations/tuppr</tspan></text>

  <!-- Separator 2 -->
  <line x1="28" y1="314" x2="792" y2="314" stroke="#21262d" stroke-width="1"/>

  <!-- Contact -->
  <text x="28" y="334"><tspan class="key">Web</tspan><tspan class="dim">      </tspan><tspan class="link">resume.samokorie.com</tspan></text>
  <text x="28" y="358"><tspan class="key">LinkedIn</tspan><tspan class="dim">  </tspan><tspan class="link">linkedin.com/in/sokorie</tspan></text>

  <!-- Neofetch color palette -->
  <rect x="28"  y="378" width="16" height="10" rx="2" fill="#000000"/>
  <rect x="50"  y="378" width="16" height="10" rx="2" fill="#ff5f57"/>
  <rect x="72"  y="378" width="16" height="10" rx="2" fill="#28ca41"/>
  <rect x="94"  y="378" width="16" height="10" rx="2" fill="#ffbd2e"/>
  <rect x="116" y="378" width="16" height="10" rx="2" fill="#58a6ff"/>
  <rect x="138" y="378" width="16" height="10" rx="2" fill="#bc8cff"/>
  <rect x="160" y="378" width="16" height="10" rx="2" fill="#79c0ff"/>
  <rect x="182" y="378" width="16" height="10" rx="2" fill="#e6edf3"/>

</svg>